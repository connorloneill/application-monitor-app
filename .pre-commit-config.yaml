repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key

  # Prevent secrets from being committed
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # TypeScript / JS linting
  - repo: local
    hooks:
      - id: eslint-client
        name: ESLint (client)
        entry: bash -c 'cd client && npx eslint --max-warnings=0 src/'
        language: system
        types: [ts, tsx]
        pass_filenames: false

      - id: tsc-client
        name: TypeScript check (client)
        entry: bash -c 'cd client && npx tsc --noEmit'
        language: system
        pass_filenames: false

      - id: tsc-server
        name: TypeScript check (server)
        entry: bash -c 'cd server && npx tsc --noEmit'
        language: system
        pass_filenames: false
