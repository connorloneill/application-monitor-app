version: '3.8'

services:
  client:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.client
    ports:
      - '6110:80'
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:3000

  server:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.server
    ports:
      - '3000:3000'
    env_file:
      - ../server/.env
    volumes:
      - logs:/app/logs

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server

  # Production-like single container (use: docker compose --profile prod up combined)
  combined:
    profiles: ["prod"]
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.combined
    ports:
      - '3000:3000'
    env_file:
      - ../server/.env

volumes:
  logs:
