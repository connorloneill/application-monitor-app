name: PR Size Labeler

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    name: Label PR by Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 100
          m_label: 'size/M'
          m_max_size: 300
          l_label: 'size/L'
          l_max_size: 700
          xl_label: 'size/XL'
          fail_if_xl: false
          message_if_xl: >
            :warning: This PR is very large. Consider breaking it into smaller,
            more focused PRs for easier review.
          files_to_ignore: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
