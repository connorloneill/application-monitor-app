name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# ── REQUIRED checks (configured in branch protection) ─────────────────────
# These MUST pass before any PR can merge:
#   - "Lint & Type Check"
#   - "Unit Tests"
#
# ── INFORMATIONAL checks (run but do NOT block merges) ────────────────────
# These report status on the PR but a failure never blocks a merge:
#   - "E2E Tests"
#
# To promote a check from informational → required:
#   Settings → Branches → main → Edit → Required status checks → add job name
# ──────────────────────────────────────────────────────────────────────────

jobs:

  # ── REQUIRED ─────────────────────────────────────────────────────────────

  lint-and-type-check:
    name: Lint & Type Check        # ← name must match branch protection config exactly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install client deps
        run: cd client && npm ci

      - name: Install server deps
        run: cd server && npm ci

      - name: Lint client
        run: cd client && npm run lint

      - name: Type-check client
        run: cd client && npx tsc --noEmit

      - name: Type-check server
        run: cd server && npx tsc --noEmit

  unit-tests:
    name: Unit Tests               # ← name must match branch protection config exactly
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server deps
        run: cd server && npm ci

      - name: Run server tests
        run: cd server && npm test

  # ── INFORMATIONAL ─────────────────────────────────────────────────────────
  # Failures here are visible on the PR but will NOT block the merge.
  # Fix them, but they won't hold up a hotfix or unrelated change.

  e2e:
    name: E2E Tests                # informational — not in branch protection required list
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true        # job failure is reported but does not fail the workflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci && cd client && npm ci && cd ../server && npm ci

      - name: Install Playwright
        run: cd tests/e2e && npx playwright install --with-deps chromium

      - name: Build and start app
        run: npm run build && npm run start &
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret

      - name: Run E2E tests
        run: cd tests/e2e && npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
